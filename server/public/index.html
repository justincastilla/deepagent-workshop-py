<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevRel-DeepAgent — Workshop</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>DevRel-DeepAgent</h1>
        <p class="subtitle">Workshop edition · 4 specialist subagents</p>
      </header>

      <section class="query">
        <textarea
          id="query"
          rows="3"
          placeholder="Ask about a technology, e.g. 'Evaluate elastic/elasticsearch — should we recommend it?'"
        >Evaluate elastic/elasticsearch — should we recommend it?</textarea>
        <button id="submit">Run agent</button>
      </section>

      <section class="output">
        <div class="panel activity-panel">
          <div class="panel-head">
            <h2>Activity</h2>
          </div>
          <div id="activity" class="activity">
            <section class="group todos-group" data-group="todos">
              <div class="group-header">
                <span class="group-dot"></span>
                <span class="group-label">todos</span>
                <span class="group-count">0</span>
              </div>
              <ol class="todos-list" id="todos-list"></ol>
              <div class="todos-empty">(no todos yet)</div>
            </section>
            <section class="group" data-group="orchestrator">
              <div class="group-header">
                <span class="group-dot"></span>
                <span class="group-label">orchestrator</span>
                <span class="group-count">0</span>
              </div>
              <div class="group-body"></div>
            </section>
            <section class="group" data-group="metrics-agent">
              <div class="group-header">
                <span class="group-dot"></span>
                <span class="group-label">metrics-agent</span>
                <span class="group-count">0</span>
              </div>
              <div class="group-body"></div>
            </section>
            <section class="group" data-group="sentiment-agent">
              <div class="group-header">
                <span class="group-dot"></span>
                <span class="group-label">sentiment-agent</span>
                <span class="group-count">0</span>
              </div>
              <div class="group-body"></div>
            </section>
            <section class="group" data-group="web-agent">
              <div class="group-header">
                <span class="group-dot"></span>
                <span class="group-label">web-agent</span>
                <span class="group-count">0</span>
              </div>
              <div class="group-body"></div>
            </section>
            <section class="group" data-group="elastic-agent">
              <div class="group-header">
                <span class="group-dot"></span>
                <span class="group-label">elastic-agent</span>
                <span class="group-count">0</span>
              </div>
              <div class="group-body"></div>
            </section>
          </div>
        </div>
        <div id="final-panel" class="panel final-panel hidden">
          <div class="panel-head">
            <h2>Final synthesis</h2>
            <button id="download-md" class="download-btn" disabled title="Download the synthesis as a .md file">
              ↓ Download .md
            </button>
          </div>
          <div id="final" class="final placeholder">
            (the orchestrator's final reply will appear here)
          </div>
        </div>
      </section>
    </main>
    <!-- Markdown renderer (used to format the Final synthesis panel) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
